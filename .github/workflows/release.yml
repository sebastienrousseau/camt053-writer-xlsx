name: Publish Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/camt053-writer-xlsx
    permissions:
      contents: write
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Verify tag matches package version
        run: |
          # Parse the version literal directly rather than importing
          # the package (which would transitively require openpyxl +
          # camt053 to be installed first).
          TAG="${GITHUB_REF_NAME#v}"
          PKG_INIT=$(grep -E '^__version__' camt053_writer_xlsx/__init__.py | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          PKG_TOML=$(grep -E '^version' pyproject.toml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "Tag: $TAG | __init__.py: $PKG_INIT | pyproject.toml: $PKG_TOML"
          if [ "$TAG" != "$PKG_INIT" ] || [ "$PKG_INIT" != "$PKG_TOML" ]; then
            echo "Version mismatch; aborting." >&2
            exit 1
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTE_PATH="releases/v${VERSION}.md"
          if [ ! -f "$NOTE_PATH" ]; then
            echo "Release notes missing at $NOTE_PATH" >&2
            exit 1
          fi
          echo "path=$NOTE_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          files: dist/*

      - name: Publish to PyPI via OIDC trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1

      # Keyless sigstore signatures (Fulcio + Rekor via the workflow's OIDC
      # identity, no secrets) attached to the GitHub release so it is
      # verifiably signed (.sig + .pem per distribution).
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign distributions (keyless) and attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in dist/*; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          gh release upload "${GITHUB_REF_NAME}" dist/*.sig dist/*.pem --clobber
